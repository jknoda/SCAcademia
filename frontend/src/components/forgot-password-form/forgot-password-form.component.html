<div class="login-form-container">
  <h2>Recuperar Senha</h2>
  <p>Informe seu email para receber o link de redefinição</p>

  <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Email *</label>
      <input id="email" type="email" formControlName="email" placeholder="Ex: usuario@academia.com" class="form-control" />
      <div class="error-message" *ngIf="getFieldError('email')">
        {{ getFieldError('email') }}
      </div>
    </div>

    <div *ngIf="errorMessage" class="error-alert">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="success-message">
      {{ successMessage }}
    </div>

    <button type="submit" [disabled]="!forgotForm.valid || isLoading" class="btn btn-primary">
      {{ isLoading ? 'Enviando...' : 'Enviar Link' }}
    </button>
  </form>

  <div class="register-link">
    Lembrou sua senha? <a (click)="goToLogin()" href="#" style="color:#0052CC;font-weight:600">Voltar para Login</a>
  </div>
</div>
