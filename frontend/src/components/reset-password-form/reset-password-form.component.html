<div class="login-form-container">
  <h2>Redefinir Senha</h2>
  <p>Digite sua nova senha para recuperar o acesso</p>

  <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="newPassword">Nova senha *</label>
      <input id="newPassword" type="password" formControlName="newPassword" placeholder="Nova senha" class="form-control" />
      <div class="error-message" *ngIf="getFieldError('newPassword')">
        {{ getFieldError('newPassword') }}
      </div>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirmar senha *</label>
      <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="Repita a nova senha" class="form-control" />
      <div class="error-message" *ngIf="resetForm.errors?.['passwordMismatch'] && resetForm.touched">
        As senhas não coincidem
      </div>
    </div>

    <div *ngIf="errorMessage" class="error-alert">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="success-message">
      {{ successMessage }}
    </div>

    <button type="submit" [disabled]="!resetForm.valid || isLoading" class="btn btn-primary">
      {{ isLoading ? 'Salvando...' : 'Redefinir Senha' }}
    </button>
  </form>

  <div class="register-link">
    Link inválido? <a (click)="goToForgotPassword()" href="#" style="color:#0052CC;font-weight:600">Solicitar novo link</a>
  </div>
</div>
