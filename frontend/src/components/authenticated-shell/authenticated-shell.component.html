<div class="master-shell" *ngIf="currentUser as user; else loadingState">
  <header class="dashboard-header">
    <div class="header-content">
      <div class="logo">
        <button type="button" class="menu-toggle" (click)="toggleMobileMenu()" aria-label="Abrir menu de navegação">
          ☰
        </button>
        <img [src]="getAcademyLogo()" alt="Logotipo da academia" class="banner-logo" />
        <h1>{{ user.academy.fantasyName || user.academy.name }}</h1>
      </div>

      <div class="header-info">
        <img [src]="getUserPhoto()" alt="Foto do usuário" class="user-avatar" />
        <span class="welcome">Bem-vindo, {{ user.fullName }}</span>
        <button (click)="logout()" class="btn-logout">
          <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          <span class="btn-label">Sair</span>
        </button>
      </div>
    </div>
  </header>

  <div class="master-shell-body">
    <div class="mobile-backdrop" *ngIf="isMobileMenuOpen" (click)="closeMobileMenu()"></div>

    <aside class="shell-sidebar" [class.shell-sidebar--open]="isMobileMenuOpen">
      <div class="sidebar-head">
        <p class="sidebar-eyebrow">Navegação</p>
        <strong>{{ user.role }}</strong>
      </div>

      <nav class="sidebar-nav" aria-label="Navegação principal">
        <button
          type="button"
          class="sidebar-link"
          *ngFor="let item of getVisibleMenuItems()"
          [class.active]="isRouteActive(item)"
          (click)="navigateTo(item)"
        >
          <span class="sidebar-link-icon">{{ item.icon }}</span>
          <span>{{ item.label }}</span>
        </button>
      </nav>
    </aside>

    <section class="shell-main">
      <div class="shell-breadcrumbs" *ngIf="breadcrumbs.length > 0">
        <span class="breadcrumbs-prefix">Você está em</span>
        <nav aria-label="Breadcrumb">
          <ng-container *ngFor="let item of breadcrumbs; let last = last">
            <span class="breadcrumb-item" [class.current]="last">{{ item.label }}</span>
            <span *ngIf="!last" class="breadcrumb-separator">/</span>
          </ng-container>
        </nav>
      </div>

      <div class="master-shell-content">
        <ng-content></ng-content>
      </div>
    </section>
  </div>

  <footer class="dashboard-footer">
    <p>&copy; 2026 SCAcademia. Sistema de Gerenciamento de Treinamentos com Conformidade LGPD.</p>
  </footer>
</div>

<ng-template #loadingState>
  <div class="loading">
    <p>Carregando...</p>
  </div>
</ng-template>
