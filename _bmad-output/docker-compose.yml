version: '3.9'

services:
  # ============================================================================
  # DATABASE — PostgreSQL 14
  # ============================================================================
  postgres:
    image: postgres:14-alpine
    container_name: scacademia-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-development123}
      POSTGRES_DB: ${DB_NAME:-scacademia}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=pt_BR.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/migrations
      - ./database/seeds:/seeds
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-root} -d ${DB_NAME:-scacademia}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scacademia-network
    restart: unless-stopped

  # ============================================================================
  # CACHE — Redis
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: scacademia-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scacademia-network
    restart: unless-stopped

  # ============================================================================
  # BACKEND API — Node.js / Express (Placeholder)
  # ============================================================================
  backend:
    image: node:18-alpine
    container_name: scacademia-backend
    working_dir: /app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-development123}
      DB_NAME: ${DB_NAME:-scacademia}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      API_PORT: 3000
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: /bin/sh -c "npm install && npm start"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scacademia-network
    restart: unless-stopped

  # ============================================================================
  # FRONTEND — React / Angular (Placeholder Nginx)
  # ============================================================================
  frontend:
    image: nginx:alpine
    container_name: scacademia-frontend
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - scacademia-network
    restart: unless-stopped

  # ============================================================================
  # ADMINER — Database UI (Development Only)
  # ============================================================================
  adminer:
    image: adminer:latest
    container_name: scacademia-adminer
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - scacademia-network
    restart: unless-stopped

  # ============================================================================
  # REDIS COMMANDER — Cache UI (Development Only)
  # ============================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: scacademia-redis-cli
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - scacademia-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  scacademia-network:
    driver: bridge
