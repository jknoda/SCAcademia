# ============================================================================
# STATUS DEFINITIONS
# ============================================================================

# Epic Status (STATE MACHINE):
# ├─ backlog: Epic not yet started
# ├─ in-progress: Epic actively being worked on
# └─ done: All stories in epic completed

# Epic Status Transitions:
# ├─ backlog → in-progress: AUTO when first story is created (via create-story)
# ├─ in-progress → done: MANUAL when all stories reach 'done' status
# └─ Can only iterate forward (no backward moves)

# Story Status (STATE MACHINE):
# ├─ backlog: Story only exists in epic file, no dedicated story file yet
# ├─ ready-for-dev: Story file created in stories folder, ready for developer
# ├─ in-progress: Developer actively working on implementation
# ├─ review: Ready for code review (moved here by Dev workflow)
# └─ done: Story completed & approved

# Story Status Transitions:
# ├─ backlog → ready-for-dev: AUTO when story file created (1-1-story-title.md)
# ├─ ready-for-dev → in-progress: Developer starts work
# ├─ in-progress → review: Developer finishes implementation + tests
# ├─ review → in-progress: Code review finds issues, back to fix
# └─ review → done: Code review approved

# Retrospective Status:
# ├─ optional: Can be completed but not required
# └─ done: Retrospective has been completed

# ============================================================================
# WORKFLOW NOTES
# ============================================================================

# SPRINT MASTER WORKFLOW:
# 1. Run "sprint-planning" → generates this file with all items in 'backlog'
# 2. Run "create-story Epic N Story M" → creates story file, shows up in 'ready-for-dev'
# 3. Run "dev this story [file]" → dev works on it (watches for 'in-progress' status)
# 4. Dev finishes → story moves to 'review'
# 5. Run "code-review" → review happens
# 6. If changes needed → back to 'in-progress', goto step 3
# 7. If approved → story becomes 'done'
# 8. Continue with next story in Sprint Plan

# KEY RULES:
# - Stories typically worked in order within epic (but can parallelize if team capacity)
# - Never downgrade status (e.g., 'done' → 'in-progress' not allowed)
# - Preserve existing status if this file is re-generated
# - Retrospective recommended when epic fully done, but optional

